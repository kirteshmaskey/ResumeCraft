<aside class="sidebar">
  <div class="brand">
    <div class="brand-icon">
      <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
        <rect width="48" height="48" rx="12" fill="url(#grad)" />
        <path d="M14 24H34M14 16H34M14 32H24" stroke="white" stroke-width="3" stroke-linecap="round"
          stroke-linejoin="round" />
        <defs>
          <linearGradient id="grad" x1="0" y1="0" x2="48" y2="48">
            <stop stop-color="#3b82f6" />
            <stop offset="1" stop-color="#2563eb" />
          </linearGradient>
        </defs>
      </svg>
    </div>
    <span class="brand-name">ResumeCraft</span>
  </div>

  <nav class="nav-links">
    <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">🏠</span> Dashboard
    </a>
    <a routerLink="/resumes" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">📄</span> Master Resumes
    </a>
    <a routerLink="/generator" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">✨</span> AI Generator
    </a>
    <a routerLink="/settings" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">⚙️</span> Settings
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="user-profile" *ngIf="user">
      <div class="avatar">{{ (user.name || 'U')[0] | uppercase }}</div>
      <div class="user-details">
        <span class="user-name" [title]="user.name">{{ user.name || 'User' }}</span>
        <span class="user-email" [title]="user.email">{{ user.email }}</span>
      </div>
    </div>
    <button class="logout-btn" (click)="logout()">Logout</button>
  </div>
</aside>
